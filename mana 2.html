<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Receitas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #FFFFFF;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Única coisa no topo: a barra de busca */
        .search-box {
            width: 100%;
            margin: 10px 0 30px 0;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px;
            font-size: 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            transition: all 0.2s;
            background: #FFFFFF;
            padding-right: 50px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #E63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }

        .search-box button {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px 12px;
            color: #E63946;
        }

        .recipes-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .recipe-card {
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .recipe-card:hover {
            border-color: #E63946;
            box-shadow: 0 4px 12px rgba(230, 57, 70, 0.1);
        }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .recipe-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #E63946;
        }

        .expand-icon {
            color: #E63946;
            font-size: 20px;
            transition: transform 0.2s;
        }

        .recipe-details {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #E2E8F0;
        }

        .recipe-card.expanded .recipe-details {
            display: block;
        }

        .recipe-details p {
            margin: 12px 0 6px 0;
            color: #4A5568;
            font-weight: 600;
        }

        .recipe-details ul {
            margin: 0 0 12px 0;
            padding-left: 24px;
            color: #4A5568;
        }

        .recipe-details li {
            margin: 4px 0;
            line-height: 1.5;
        }

        .recipe-details .preparation {
            white-space: pre-line;
            line-height: 1.6;
            color: #4A5568;
            margin-bottom: 12px;
            font-weight: normal;
        }

        .observation {
            background: #F7FAFC;
            padding: 12px;
            border-radius: 8px;
            font-style: italic;
            color: #4A5568;
            margin-top: 12px;
            font-size: 0.95em;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #A0AEC0;
            font-size: 1.1em;
            background: #F7FAFC;
            border-radius: 16px;
        }

        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .recipe-title {
                font-size: 1.2em;
            }
        }
    </style>
</head>

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            displayRecipes(recipes);
            
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    searchRecipes();
                }
            });
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const searchTerm = e.target.value.toLowerCase();
                filterRecipes(searchTerm);
            });
        });

        function searchRecipes() {
            const input = document.getElementById('searchInput');
            filterRecipes(input.value.toLowerCase());
        }

        function filterRecipes(searchTerm) {
            if (!searchTerm) {
                displayRecipes(recipes);
                return;
            }
            
            const filtered = recipes.filter(recipe => 
                recipe.name.toLowerCase().includes(searchTerm) ||
                recipe.ingredients.some(i => i.toLowerCase().includes(searchTerm))
            );
            
            displayRecipes(filtered);
        }

        function displayRecipes(recipesToShow) {
            const list = document.getElementById('recipesList');
            
            if (recipesToShow.length === 0) {
                list.innerHTML = '<div class="no-results">🔍 Nenhuma receita encontrada</div>';
                return;
            }
            
            list.innerHTML = recipesToShow.map(recipe => {
                // Monta os detalhes da receita
                let details = '';
                
                // Ingredientes
                details += '<p>📝 Ingredientes:</p><ul>';
                recipe.ingredients.forEach(ing => {
                    details += `<li>${ing}</li>`;
                });
                details += '</ul>';
                
                // Validade
                if (recipe.validity) {
                    details += `<p>⏰ Validade:</p><div class="preparation">${recipe.validity.replace(/\n/g, '<br>')}</div>`;
                }
                
                // Rendimento
                if (recipe.yield) {
                    details += `<p>⚖️ Rendimento:</p><div class="preparation">${recipe.yield}</div>`;
                }
                
                // Armazenamento
                if (recipe.storage) {
                    details += `<p>🌡️ Armazenamento:</p><div class="preparation">${recipe.storage}</div>`;
                }
                
                // Modo de preparo
                details += `<p>👩‍🍳 Modo de preparo:</p><div class="preparation">${recipe.prep.replace(/\n/g, '<br>')}</div>`;
                
                // EPIs
                if (recipe.epi) {
                    details += `<p>🧤 EPIs recomendados:</p><div class="preparation">${recipe.epi}</div>`;
                }
                
                // Observações
                if (recipe.obs) {
                    details += `<div class="observation">📌 ${recipe.obs}</div>`;
                }
                
                return `
                    <div class="recipe-card" onclick="toggleCard(this)">
                        <div class="recipe-header">
                            <span class="recipe-title">${recipe.name}</span>
                            <span class="expand-icon">▼</span>
                        </div>
                        <div class="recipe-details">
                            ${details}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleCard(card) {
            card.classList.toggle('expanded');
            const icon = card.querySelector('.expand-icon');
            icon.textContent = card.classList.contains('expanded') ? '▲' : '▼';
        }
    </script>
